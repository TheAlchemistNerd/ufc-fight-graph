name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "data_access/**"
      - "visualizations/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard image
        run: |
          docker build -t ufc-dashboard .
          docker images ufc-dashboard

      - name: Test dashboard syntax
        run: |
          docker run --rm ufc-dashboard python -c "
          import ast
          import sys
          files = [
              'dashboard/app.py',
              'data_access/repositories.py',
              'visualizations/charts.py',
          ]
          for f in files:
              try:
                  with open(f) as fh:
                      ast.parse(fh.read())
                  print(f'OK: {f}')
              except SyntaxError as e:
                  print(f'FAIL: {f}: {e}')
                  sys.exit(1)
          print('All files parse OK')
          "

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push dashboard image
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/ufc-dashboard
          docker tag ufc-dashboard $IMAGE:latest
          docker push $IMAGE:latest
