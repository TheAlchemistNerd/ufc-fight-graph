name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linters
        run: |
          pip install flake8 pylint black isort

      - name: Check formatting with black
        run: |
          black --check --diff . --exclude ".venv|__pycache__|\.pytest_cache"
        continue-on-error: true

      - name: Check imports with isort
        run: |
          isort --check-only --diff . --skip .venv --skip __pycache__ --skip .pytest_cache
        continue-on-error: true

      - name: Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude .venv,__pycache__,.pytest_cache

      - name: Run pylint
        run: |
          pylint data_access/ visualizations/ dashboard/ --disable=C0114,C0115,C0116,R0903,R0913 --fail-under=7.0
        continue-on-error: true
